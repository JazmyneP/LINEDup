// ─── RECOMMENDATION LOGIC ───────────────────────────────────────────────────
function recommend(answers) {
  const gender  = answers.gender  || "all";
  const length  = answers.length  || "short";
  const texture = answers.texture || "straight";
  const vibes   = answers.vibe    || [];
  const extra   = (answers.extra  || "").toLowerCase();

  const isBold    = vibes.includes("bold");
  const isEdgy    = vibes.includes("edgy");
  const isNatural = vibes.includes("natural");
  const isLowM    = vibes.includes("low-maint");
  const isPro     = vibes.includes("professional");
  const isClean   = vibes.includes("clean");
  const isClassic = vibes.includes("classic");
  const isRetro   = vibes.includes("retro");

  const isLong   = length === "long";
  const isMedium = length === "medium";
  const isShort  = length === "short" || length === "very short";

  const noHaircut = /year|months|long time|been a while|haven't|havent/.test(extra);

  // LOCS
  if (texture === "locs") {
    if (noHaircut || isNatural) return ["Loc Retwist", "Loc Shape-Up"];
    return ["Loc Retwist", "Loc Shape-Up"];
  }

  // WAVES
  if (texture === "waves") return ["360 Waves", "Taper Fade"];

  // COILY / 4C
  if (texture === "coily") {
    if (isLong)   return isNatural ? ["Tapered Natural","Loc Retwist"] : ["High Top Fade","Natural Afro"];
    if (isBold)   return ["High Top Fade","Burst Fade","Natural Afro"];
    if (isLowM)   return ["TWA (Teeny Weeny Afro)","Natural Afro"];
    if (isNatural)return ["Tapered Natural","Natural Afro","Twist Out"];
    return ["Tapered Natural","High Top Fade","Natural Afro"];
  }

  // CURLY
  if (texture === "curly") {
    if (isLong && gender !== "male")  return ["Curly Shag","Wolf Cut","Long Layers"];
    if (isLong)                       return ["Curly Undercut","Undercut"];
    if (isMedium && isEdgy)           return ["Wolf Cut","Curly Shag"];
    if (isMedium)                     return ["Textured Crop","Curly Undercut"];
    if (isPro)                        return ["Disconnected Undercut","Textured Crop"];
    return ["Textured Crop","Curly Undercut","Wash and Go"];
  }

  // LONG HAIR
  if (isLong) {
    if (noHaircut)                         return ["Long Hair Trim","Long Layers"];
    if (isEdgy && gender !== "male")       return ["Wolf Cut","Mullet Shag","Shag Cut"];
    if (isEdgy)                            return ["Modern Mullet","Wolf Cut"];
    if (isBold && gender !== "male")       return ["Wolf Cut","Asymmetric Bob"];
    if (isRetro)                           return ["Shag Cut","Mod Cut"];
    if (isNatural || isLowM)               return ["Bun / Top Knot","Long Hair Trim","Long Layers"];
    if (gender !== "male")                 return ["Long Layers","Lob (Long Bob)","Curtain Bangs"];
    return ["Bun / Top Knot","Slick Back","Modern Mullet"];
  }

  // MEDIUM HAIR
  if (isMedium) {
    if (isEdgy && gender !== "male")  return ["Wolf Cut","Shag Cut","Bob"];
    if (isEdgy)                       return ["Modern Mullet","Undercut"];
    if (isRetro)                      return ["Mod Cut","Pompadour"];
    if (isBold)                       return ["Pompadour","Undercut","High Fade"];
    if (isPro)                        return ["Side Part","Ivy League","Pompadour"];
    if (isClassic)                    return ["Side Part","Pompadour","Bob"];
    if (gender !== "male")            return ["Lob (Long Bob)","Bob","Wolf Cut"];
    return ["Textured Crop","Quiff","Side Part"];
  }

  // SHORT HAIR
  if (gender !== "male") {
    if (isBold || isEdgy)   return ["Undercut Pixie","Pixie Cut","High Fade"];
    if (isClassic)          return ["Pixie Cut","French Crop","Crew Cut"];
    return ["Pixie Cut","French Crop","Textured Crop"];
  }

  // SHORT MALE / ALL
  if (isRetro)    return ["Mod Cut","Flat Top","Pompadour"];
  if (isEdgy)     return ["Disconnected Undercut","High Fade","Burst Fade"];
  if (isBold)     return ["High Fade","High Top Fade","Flat Top"];
  if (isPro)      return ["Taper Fade","Crew Cut","Ivy League"];
  if (isLowM)     return ["Buzz Cut","Crew Cut","Taper Fade"];
  if (isClassic)  return ["Taper Fade","Side Part","Crew Cut"];
  if (isClean)    return ["Skin Fade","French Crop","Shape-Up"];
  return ["Mid Fade","Textured Crop","Taper Fade"];
}

// ─── QUIZ ────────────────────────────────────────────────────────────────────
function Quiz({ nav, setResult }) {
  const [step, setStep]       = useState(0);
  const [answers, setAnswers] = useState({});
  const [selected, setSelected] = useState([]);
  const [text, setText]       = useState("");
  const [loading, setLoading] = useState(false);
  const current = STEPS[step];

  const toggle = (val) => {
    if (current.type === "single") {
      setSelected([val]);
    } else {
      if (selected.includes(val)) setSelected(selected.filter(v=>v!==val));
      else if (selected.length < 3) setSelected([...selected, val]);
    }
  };

  const advance = async () => {
    const val = current.type === "text" ? text.trim() : (current.type === "single" ? selected[0] : selected);
    if (!val && !current.optional && current.type !== "multi") return;
    if (current.type === "multi" && selected.length === 0 && !current.optional) return;

    const updated = { ...answers, [current.id]: val || (current.type === "multi" ? [] : "") };
    setAnswers(updated);
    setSelected([]);
    setText("");

    const isLast = step === STEPS.length - 1;
    if (!isLast) { setStep(s=>s+1); return; }

    setLoading(true);
    await new Promise(r=>setTimeout(r, 1200));
    const cuts = recommend(updated);
    setResult({ cuts, answers: updated });
    nav("result");
  };

  const back = () => {
    const prev = STEPS[step-1];
    const prevVal = answers[prev.id];
    if (prev.type === "single") setSelected(prevVal ? [prevVal] : []);
    else if (prev.type === "multi") setSelected(prevVal || []);
    else setText(prevVal || "");
    setStep(s=>s-1);
  };

  if (loading) return (
    <div style={{minHeight:"80vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <div style={{fontSize:52,animation:"spin 1.4s linear infinite",display:"inline-block"}}>✂</div>
      <p style={{fontSize:11,letterSpacing:"0.22em",textTransform:"uppercase",color:MUTED}}>Finding your cut…</p>
    </div>
  );

  return (
    <div className="fu" style={{maxWidth:560,margin:"0 auto",padding:"52px 24px 80px"}}>
      <div style={{display:"flex",gap:6,marginBottom:52}}>
        {STEPS.map((_,i)=>(
          <div key={i} style={{flex:1,height:2,background:i<=step?A:BORDER,transition:"background 0.3s"}}/>
        ))}
      </div>
      <Lbl style={{marginBottom:14}}>Step {step+1} of {STEPS.length}{current.optional?" — optional":""}</Lbl>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"clamp(30px,7vw,48px)",color:INK,lineHeight:1,marginBottom:current.hint?8:28}}>
        {current.q}
      </h2>
      {current.hint && <p style={{fontSize:12,color:MUTED,marginBottom:20,fontWeight:300}}>{current.hint}</p>}

      {current.type === "text" ? (
        <textarea rows={4} value={text} autoFocus
          onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();advance();}}}
          placeholder={current.placeholder}
          style={{resize:"none",borderColor:text.trim()?A:BORDER}}
        />
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {current.opts.map(o=>(
            <button key={o.val} className={"opt"+(selected.includes(o.val)?" sel":"")} onClick={()=>toggle(o.val)}>
              <span style={{fontSize:18,width:24,textAlign:"center",flexShrink:0}}>{o.icon}</span>
              <span style={{flex:1}}>{o.label}</span>
              {selected.includes(o.val) && <span style={{color:A,fontSize:16}}>✓</span>}
            </button>
          ))}
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",marginTop:28}}>
        {step>0
          ? <button className="btn bo" onClick={back} style={{padding:"12px 24px",fontSize:11}}>← Back</button>
          : <div/>
        }
        <button className="btn bp" onClick={advance}
          style={{padding:"13px 34px",fontSize:11,
            opacity:(current.type==="text"&&!text.trim()&&!current.optional)||(current.type!=="text"&&selected.length===0&&!current.optional)?0.35:1}}>
          {step===STEPS.length-1?"Get My Cut →":"Next →"}
        </button>
      </div>
    </div>
  );
}

// ─── RESULT ──────────────────────────────────────────────────────────────────

  return (
    <div className="fu" style={{maxWidth:660,margin:"0 auto",padding:"52px 24px 80px"}}>

          <p style={{fontSize:11,color:MUTED,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>We found {cuts.length} cuts for you:</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {cuts.map((name,i)=>(
              <button key={name} onClick={()=>setActiveIdx(i)} className="btn" style={{padding:"8px 16px",fontSize:10,background:i===activeIdx?A:"#fff",color:i===activeIdx?"#fff":INK,border:"1.5px solid "+(i===activeIdx?A:BORDER)}}>

          <div style={{display:"flex",gap:16}}>
            <span style={{color:A,fontSize:18,lineHeight:1,flexShrink:0}}>{row.icon}</span>
            <div>
              <div style={{fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",color:MUTED,fontWeight:600,marginBottom:7}}>{row.label}</div>
              <p style={{margin:0,fontSize:14,lineHeight:1.75,color:row.hi?INK:MUTED,fontStyle:row.hi?"italic":"normal",fontWeight:row.hi?500:300}}>{row.body}</p>
            </div>
          </div>
        </div>
      ))}

      <div style={{marginTop:52}}>
        <Lbl style={{marginBottom:12}}>Matched Barbers</Lbl>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"clamp(28px,6vw,40px)",color:INK,lineHeight:1,marginBottom:24}}>
          Who can do this in your city
        </h2>
        {displayBarbers.map(b=><BCard key={b.id} b={b} compact/>)}
        <button className="btn bo" onClick={()=>nav("directory")} style={{width:"100%",padding:14,fontSize:11,marginTop:8}}>See Full Directory →</button>
      </div>

      <div style={{display:"flex",gap:12,marginTop:44}}>
        <button className="btn bo" onClick={()=>nav("quiz")} style={{flex:1,padding:15,fontSize:11}}>Start Over ↺</button>
        <button className="btn bp" onClick={()=>nav("booking")} style={{flex:1,padding:15,fontSize:11}}>Book Now →</button>

// ─── ALL CUTS BROWSER ────────────────────────────────────────────────────────
function AllCuts({ nav }) {
  const [filter, setFilter] = useState("all");
  const [vibeFilter, setVibeFilter] = useState(null);
  const categories = ["all","male","female","all genders"];
  const vibes = [...new Set(Object.values(CUTS).map(c=>c.vibe))];
  const entries = Object.entries(CUTS).filter(([,c])=>{
    const genderOk = filter==="all" || c.gender.includes(filter) || (filter==="all genders" && c.gender.includes("all"));
    const vibeOk   = !vibeFilter || c.vibe === vibeFilter;
    return genderOk && vibeOk;
  });

  return (
    <div className="fu" style={{maxWidth:900,margin:"0 auto",padding:"52px 24px 80px"}}>
      <Lbl style={{marginBottom:16}}>Cut Library</Lbl>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"clamp(44px,9vw,68px)",fontWeight:900,color:INK,lineHeight:0.92,marginBottom:12}}>
        Every cut.<br/><span style={{color:A}}>Find yours.</span>
      </h1>
      <p style={{fontSize:15,color:MUTED,fontWeight:300,marginBottom:36}}>{Object.keys(CUTS).length} cuts — male, female, and all genders.</p>

      <div style={{marginBottom:12,display:"flex",flexWrap:"wrap",gap:6}}>
        <span style={{fontSize:10,color:MUTED,letterSpacing:"0.15em",textTransform:"uppercase",alignSelf:"center",marginRight:4}}>Gender:</span>
        {["all","male","female"].map(g=>(
          <span key={g} className={"chip"+(filter===g?" on":"")} onClick={()=>setFilter(g)}>{g}</span>
        ))}
      </div>
      <div style={{marginBottom:36,display:"flex",flexWrap:"wrap",gap:6}}>
        <span style={{fontSize:10,color:MUTED,letterSpacing:"0.15em",textTransform:"uppercase",alignSelf:"center",marginRight:4}}>Vibe:</span>
        <span className={"chip"+(!vibeFilter?" on":"")} onClick={()=>setVibeFilter(null)}>All</span>
        {vibes.map(v=>(
          <span key={v} className={"chip"+(vibeFilter===v?" on":"")} onClick={()=>setVibeFilter(v===vibeFilter?null:v)}>{v}</span>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
        {entries.map(([name, c])=>(
          <div key={name} className="card" style={{padding:"20px 22px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.14em",color:A,textTransform:"uppercase"}}>{c.vibe}</span>
              <div style={{display:"flex",gap:3}}>
                {c.gender.map(g=><span key={g} style={{fontSize:8,padding:"2px 5px",border:"1px solid "+BORDER,color:MUTED,textTransform:"uppercase"}}>{g}</span>)}
              </div>
            </div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:INK,lineHeight:1.2,marginBottom:8}}>{name}</div>
            <p style={{fontSize:12,color:MUTED,lineHeight:1.6,fontWeight:300,marginBottom:12}}>{c.why.slice(0,80)}…</p>
            <button className="btn bp" onClick={()=>nav("quiz")} style={{padding:"8px 16px",fontSize:9,width:"100%"}}>Get This Cut →</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── DIRECTORY ───────────────────────────────────────────────────────────────
function Directory({ nav }) {
  const allSpecs = [...new Set(BARBERS.flatMap(b=>b.specialties))];
  const [active, setActive] = useState(null);
  const filtered = active ? BARBERS.filter(b=>b.specialties.includes(active)) : BARBERS;
  return (
    <div className="fu" style={{maxWidth:700,margin:"0 auto",padding:"52px 24px 80px"}}>
      <Lbl style={{marginBottom:16}}>Barber Directory</Lbl>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"clamp(44px,9vw,68px)",fontWeight:900,color:INK,lineHeight:0.92,marginBottom:12}}>
        Find your<br/><span style={{color:A}}>specialist.</span>
      </h1>
      <p style={{fontWeight:300,fontSize:15,color:MUTED,marginBottom:36}}>Every barber curated and tagged by what they actually do best.</p>
      <div style={{marginBottom:32,display:"flex",flexWrap:"wrap",alignItems:"center",gap:4}}>
        <span style={{fontSize:10,color:MUTED,letterSpacing:"0.15em",textTransform:"uppercase",marginRight:8}}>Filter:</span>
        <span className={"chip"+(active===null?" on":"")} onClick={()=>setActive(null)}>All</span>
        {allSpecs.slice(0,10).map(s=>(
          <span key={s} className={"chip"+(active===s?" on":"")} onClick={()=>setActive(s===active?null:s)}>{s}</span>
        ))}
      </div>
      {filtered.map(b=><BCard key={b.id} b={b}/>)}
      <div style={{background:ACCENT_LIGHT,border:"1px solid "+ACCENT_MID,padding:32,textAlign:"center",marginTop:48}}>

}

// ─── BOOKING ─────────────────────────────────────────────────────────────────
function Booking({ nav }) {
  const [barber, setBarber] = useState(null);
  const [form, setForm]     = useState({name:"",phone:"",date:"",time:""});
  const [screen, setScreen] = useState("pick");
  const TIMES = ["9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM"];

  if (screen==="pick") return (
    <div className="fu" style={{maxWidth:700,margin:"0 auto",padding:"52px 24px 80px"}}>
      <Lbl style={{marginBottom:16}}>Book</Lbl>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"clamp(40px,9vw,60px)",fontWeight:900,color:INK,lineHeight:0.92,marginBottom:32}}>
        Choose your<br/><span style={{color:A}}>barber.</span>
      </h1>
      {BARBERS.map(b=>(
        <div key={b.id} className="card" onClick={()=>{setBarber(b);setScreen("confirm");}} style={{padding:"18px 22px",marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:INK,marginBottom:2}}>{b.name}</div>
            <div style={{fontSize:12,color:MUTED,fontWeight:300}}>{b.shop} · {b.neighborhood}</div>
            <div style={{marginTop:6}}>{b.tags.map(t=><span key={t} className="chip" style={{fontSize:9,cursor:"default"}}>{t}</span>)}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <Stars r={b.rating}/><br/>
            <span style={{fontSize:11,color:MUTED}}>{b.price} · {b.wait}</span>
          </div>
        </div>
      ))}
    </div>
  );

  if (screen==="confirm") return (
    <div className="fu" style={{maxWidth:520,margin:"0 auto",padding:"52px 24px 80px"}}>
      <Lbl style={{marginBottom:16}}>Book with {barber.name}</Lbl>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"clamp(36px,7vw,50px)",fontWeight:900,color:INK,lineHeight:0.95,marginBottom:32}}>
        Pick your<br/><span style={{color:A}}>time.</span>
      </h1>
      {[["name","Your name","text"],["phone","Phone number","tel"]].map(([k,p,t])=>(
        <input key={k} type={t} placeholder={p} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={{marginBottom:10}}/>
      ))}
      <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={{marginBottom:16,colorScheme:"light"}}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:28}}>
        {TIMES.map(t=>(
          <button key={t} onClick={()=>setForm({...form,time:t})} style={{padding:"8px 13px",fontSize:11,fontWeight:600,cursor:"pointer",background:form.time===t?A:"#fff",color:form.time===t?"#fff":MUTED,border:"1.5px solid "+(form.time===t?A:BORDER),transition:"all 0.15s"}}>{t}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:12}}>
        <button className="btn bo" onClick={()=>setScreen("pick")} style={{flex:1,padding:14,fontSize:11}}>← Back</button>
        <button className="btn bp" onClick={()=>setScreen("done")} style={{flex:2,padding:14,fontSize:11}}>Confirm →</button>
      </div>
    </div>
  );

  return (
    <div className="fu" style={{maxWidth:520,margin:"0 auto",padding:"52px 24px 80px",textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:24}}>✂️</div>
      <Lbl style={{justifyContent:"center",marginBottom:16}}>You're Booked</Lbl>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:"clamp(44px,9vw,68px)",fontWeight:900,color:INK,marginBottom:12}}>
        You're <span style={{color:A}}>lined up.</span>
      </h1>
      <p style={{fontWeight:300,fontSize:15,color:MUTED,lineHeight:1.7,marginBottom:36}}>
        Confirmed with <strong style={{color:INK,fontWeight:600}}>{barber.name}</strong>
        {form.date && <> on <strong style={{color:INK,fontWeight:600}}>{form.date}</strong></>}
        {form.time && <> at <strong style={{color:INK,fontWeight:600}}>{form.time}</strong></>}.
      </p>
      <button className="btn bp" onClick={()=>{setScreen("pick");setBarber(null);setForm({name:"",phone:"",date:"",time:""}); }} style={{padding:"15px 40px",fontSize:11}}>
        Book Another →
      </button>
    </div>
  );
}

// ─── APP SHELL ───────────────────────────────────────────────────────────────
function LinedUp() {

    setPage(p);
    setTimeout(()=>{ topRef.current && topRef.current.scrollIntoView({behavior:"smooth"}); }, 10);
  };

  const NAV = [
    {id:"home",label:"Home"},
    {id:"quiz",label:"Find My Cut"},
    {id:"cuts",label:"All Cuts"},
    {id:"directory",label:"Barbers"},
    {id:"booking",label:"Book"},
    {id:"about",label:"About"},
  ];

  return (
    <div style={{background:BG,minHeight:"100vh",color:INK}}>
      <div ref={topRef}/>
      <nav style={{position:"sticky",top:0,zIndex:100,background:BG+"F2",backdropFilter:"blur(14px)",borderBottom:"1px solid "+BORDER,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",height:54}}>
        <div onClick={()=>nav("home")} style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:22,fontWeight:900,color:INK,cursor:"pointer"}}>
          Lined <span style={{color:A}}>Up.</span>
        </div>
        <div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
          {NAV.map(n=>(
            <span key={n.id} className="nl" onClick={()=>nav(n.id)} style={{color:page===n.id?A:MUTED}}>{n.label}</span>
          ))}
        </div>
      </nav>

      {page==="home"      && <Home nav={nav}/>}
      {page==="quiz"      && <Quiz nav={nav} setResult={setResult}/>}
      {page==="result"    && quizResult && <Result data={quizResult} nav={nav}/>}
      {page==="cuts"      && <AllCuts nav={nav}/>}
      {page==="directory" && <Directory nav={nav}/>}
      {page==="booking"   && <Booking nav={nav}/>}
      {page==="about"     && <About nav={nav}/>}

      <footer style={{borderTop:"1px solid "+BORDER,padding:"28px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontWeight:900,fontSize:18,color:MUTED}}>
          Lined <span style={{color:A}}>Up.</span>
        </div>
        <div style={{fontSize:10,color:"rgba(26,18,8,0.22)",letterSpacing:"0.14em"}}>
          AI-POWERED BARBER INTELLIGENCE · {new Date().getFullYear()}
        </div>
        <div style={{display:"flex",gap:20}}>
          {["Booksy","Squire"].map(p=>(
            <span key={p} style={{fontSize:10,color:"rgba(26,18,8,0.22)",letterSpacing:"0.12em"}}>WORKS WITH {p.toUpperCase()}</span>
          ))}
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LinedUp/>);
</script>
